<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for Gradients -->
  <defs>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <linearGradient id="secondary" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>
    <linearGradient id="tertiary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  
  <!-- Stylized Abstract Apartment Plan Layout -->
  
  <g transform="translate(96, 96)">
    <!-- Room 1 (Left Column) -->
    <rect x="0" y="0" width="140" height="320" rx="32" fill="url(#primary)" opacity="0.9" />
    
    <!-- Room 2 (Top Right) -->
    <rect x="160" y="0" width="160" height="140" rx="32" fill="url(#secondary)" opacity="0.9" />
    
    <!-- Room 3 (Bottom Right) -->
    <rect x="160" y="160" width="160" height="160" rx="32" fill="url(#tertiary)" opacity="0.9" />
    
    <!-- Split Divider Lines -->
    <line x1="150" y1="-10" x2="150" y2="330" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.2" />
    <line x1="150" y1="150" x2="330" y2="150" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.2" />
  </g>
</svg>
